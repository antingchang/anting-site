<!-- Fire InitiateCheckout on every link / social click -->
<script>
(function () {
  if (typeof fbq !== 'function') return;
  var elements = document.querySelectorAll('.link, .social');
  elements.forEach(function (el) {
    el.addEventListener('click', function () {
      var label = (el.textContent || '').trim() || el.getAttribute('aria-label') || 'unknown';
      var category = el.classList.contains('social') ? 'social_link' : 'streaming_link';
      var id = label.toLowerCase().replace(/[^a-z0-9]+/g, '_').replace(/^_|_$/g, '');
      fbq('track', 'InitiateCheckout', {
        content_name: label,
        content_category: category,
        content_ids: [id]
      });
    });
  });
})();
</script>
